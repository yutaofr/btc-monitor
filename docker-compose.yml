services:
  app:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs

  tests:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    command: ["sh", "-c", "pytest tests/unit tests/e2e tests/parity/shadow_parity_100_samples.py"]
