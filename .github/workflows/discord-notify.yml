name: Scheduled Discord Notification

on:
  schedule:
    # 19:45 UTC (EDT 15:45) and 20:45 UTC (EST 15:45)
    - cron: '45 19,20 * * 1-5'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Timing Guard (15:45 ET)
        id: check
        shell: python
        run: |
          import os
          from datetime import datetime
          import pytz
          
          # Force execution for manual trigger
          event_name = os.environ.get('GITHUB_EVENT_NAME')
          if event_name == 'workflow_dispatch':
              print("Manual trigger detected. Overriding timing guard.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f: f.write('should_run=true\n')
              exit(0)
              
          # Check US/Eastern Time
          et_tz = pytz.timezone('US/Eastern')
          now_et = datetime.now(et_tz)
          print(f"Current ET Time: {now_et.strftime('%H:%M:%S')}")
          
          # Target: 15:45 ET. Window: [15:40, 15:55]
          is_target_window = (now_et.hour == 15 and 40 <= now_et.minute <= 55)
          
          should_run = "true" if is_target_window else "false"
          print(f"Should Run: {should_run}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f: f.write(f'should_run={should_run}\n')

      - name: Execute BTC Monitor & Notify
        if: steps.check.outputs.should_run == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PYTHONPATH: .
        run: |
          # Use the python script directly as we are in the GHA environment
          python3 src/main.py --notify-discord
